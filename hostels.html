<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMates | Explore Hostels</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body class="bg-light">

<header class="main-header">
<div class="container navbar">

<div class="logo-section">
<img src="css/logo.jpg" width="45">
<h1>HMates<span>.</span></h1>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="hostels.html" class="active">Hostels</a>
<a href="booking.html">Book Now</a>
<a href="contact.html">Contact</a>
<a href="login.html" class="login-btn">Login</a>
</nav>

</div>
</header>


<section class="hostel-listing container">

<div class="listing-header text-center">
<h2>Explore Available Hostels</h2>
<p>Verified stays near Schools, Colleges, and Universities in Jaipur.</p>
</div>


<div class="filter-wrapper">
<div class="filter-box">

<label>
<i class="fas fa-filter"></i> Category:
</label>

<select id="hostelFilter">
<option value="all">All Categories</option>
<option value="boys">Boys Hostels</option>
<option value="girls">Girls Hostels</option>
</select>

</div>
</div>


<div class="cards-container" id="hostelCardsGrid">

</div>

</section>


<footer class="text-center">
<p>© 2026 HMates | Designed by Deepak Yadav & Tech Trio at JECRC</p>
</footer>



<script>

async function loadHostels(){

try{

const response = await fetch("http://127.0.0.1:5000/api/hostels");
const hostels = await response.json();

const grid = document.getElementById("hostelCardsGrid");

grid.innerHTML = "";

hostels.forEach(hostel => {

const card = `
<div class="card ${hostel.gender}">

<div class="card-img">
<img src="css/hostal.jpg">
<span class="tag">${hostel.gender}</span>
</div>

<div class="card-info">

<h3>${hostel.name}</h3>

<p>
<i class="fas fa-map-marker-alt"></i>
${hostel.location}
</p>

<div class="amenities">
<span><i class="fas fa-snowflake"></i> AC Available</span>
<span><i class="fas fa-wifi"></i> Free WiFi</span>
</div>

<div class="card-footer">

<span class="price">
₹${hostel.basePrice}/mo
</span>

<a href="booking.html" class="btn-sm">
Book
</a>

</div>

</div>

</div>
`;

grid.innerHTML += card;

});

}catch(error){

console.error("Error loading hostels:", error);

}

}



document.addEventListener("DOMContentLoaded", loadHostels);



document.getElementById("hostelFilter").addEventListener("change", function(){

const value = this.value;

const cards = document.querySelectorAll(".card");

cards.forEach(card => {

if(value === "all"){
card.style.display = "block";
}
else if(card.classList.contains(value)){
card.style.display = "block";
}
else{
card.style.display = "none";
}

});

});

</script>


</body>
</html>
